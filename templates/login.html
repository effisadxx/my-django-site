{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header bg-white text-center pt-4">
                    <h4>Вход в систему ЭДО</h4>
                    <p class="text-muted">ГАПОУ «Альметьевский политехнический техникум»</p>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Имя пользователя</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Войти</button>
                    </form>
                    <hr>
                    <div class="alert alert-info small mt-3">
                        <i class="bi bi-info-circle"></i>
                        Используйте учётные данные, выданные в техникуме.<br>
                        При отсутствии доступа обратитесь к секретарю-делопроизводителю.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
