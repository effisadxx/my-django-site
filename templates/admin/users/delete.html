{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Удаление пользователя</h4>
                </div>
                <div class="card-body text-center">
                    <p>Вы действительно хотите удалить пользователя?</p>
                    <h5>{{ user.get_full_name }}</h5>
                    <p class="text-muted">Логин: {{ user.username }} | Роль: {{ user.profile.get_role_display }}</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3">
                            <a href="{% url 'user_list' %}" class="btn btn-secondary">Отмена</a>
                            <button type="submit" class="btn btn-danger">Да, удалить</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
