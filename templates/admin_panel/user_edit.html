{% extends 'admin_panel/base.html' %}

{% block admin_content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning">
                <h4 class="mb-0"><i class="bi bi-pencil"></i> Редактирование пользователя</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Логин *</label>
                        <input type="text" name="username" class="form-control" value="{{ user.username }}" required>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Фамилия *</label>
                            <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Имя *</label>
                            <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Отчество</label>
                            <input type="text" name="patronymic" class="form-control" value="{{ user.profile.patronymic }}">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ user.email }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Телефон</label>
                        <input type="text" name="phone" class="form-control" value="{{ user.profile.phone }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Роль *</label>
                        <select name="role" class="form-select" id="roleSelect">
                            <option value="applicant" {% if user.profile.role == 'applicant' %}selected{% endif %}>Абитуриент</option>
                            <option value="student" {% if user.profile.role == 'student' %}selected{% endif %}>Студент</option>
                            <option value="teacher" {% if user.profile.role == 'teacher' %}selected{% endif %}>Преподаватель</option>
                            <option value="secretary" {% if user.profile.role == 'secretary' %}selected{% endif %}>Секретарь-делопроизводитель</option>
                            <option value="admin" {% if user.profile.role == 'admin' %}selected{% endif %}>Администратор</option>
                        </select>
                    </div>
                    
                    <div class="mb-3" id="groupField" style="display: {% if user.profile.role == 'student' %}block{% else %}none{% endif %}">
                        <label class="form-label">Группа (для студентов)</label>
                        <input type="text" name="group" class="form-control" value="{{ user.profile.group }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Новый пароль (оставьте пустым, чтобы не менять)</label>
                        <input type="password" name="new_password" class="form-control" placeholder="Введите новый пароль">
                    </div>
                    
                    <hr>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Сохранить
                        </button>
                        <a href="{% url 'admin_users' %}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const roleSelect = document.getElementById('roleSelect');
    const groupField = document.getElementById('groupField');
    
    if (roleSelect && groupField) {
        roleSelect.addEventListener('change', function() {
            if (this.value === 'student') {
                groupField.style.display = 'block';
            } else {
                groupField.style.display = 'none';
            }
        });
    }
</script>
{% endblock %}
